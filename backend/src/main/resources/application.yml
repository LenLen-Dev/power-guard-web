spring:
  application:
    name: power-guard-backend
  profiles:
    active: dev

server:
  port: 8022

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.scorpio.powerguard.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.scorpio.powerguard: INFO

refresh-job:
  queue-key: power:refresh:room
  dead-letter-queue-key: power:refresh:room:dead-letter
  active-job-key: power:refresh:active
  manual-queue-key: power:refresh:manual:queue
  runtime-key-prefix: power:refresh:job
  consumer-concurrency: 4
  redis-ttl-hours: 24

mail-consumer:
  queue-key: power:mail:queue
  retry-queue-key: power:mail:retry
  auth-retry-queue-key: power:mail:auth-retry
  dead-letter-key: power:mail:dead-letter
  sender-count-key-prefix: power:mail:sender:count
  sender-cooldown-key-prefix: power:mail:sender:cooldown
  max-daily-send-count: 100
  max-retry-count: 3
  retry-delay-seconds: 10
  auth-retry-delay-seconds: 3600
  sender-cooldown-seconds: 3600
  listener-concurrency: 1
  short-pause-min-seconds: 10
  short-pause-max-seconds: 30
  long-pause-every-attempts: 10
  long-pause-min-seconds: 600
  long-pause-max-seconds: 1800
  sender-switch-every-attempts: 10
